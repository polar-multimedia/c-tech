function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '<span class="info">Log limpiado.</span>';
}

async function runSeed() {
  const btn = document.getElementById('btnSeed');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🚀 Iniciando seed de /content en Firestore...', 'info');
  log(`📦 ${ARTICLES.length} artículos a procesar`, 'info');
  log('');

  let ok = 0, err = 0;
  for (const article of ARTICLES) {
    try {
      await db.collection('content').doc(article.slug).set(
        { ...article, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
        { merge: true }
      );
      log(`✅ ${article.slug}`, 'ok');
      ok++;
    } catch(e) {
      log(`❌ ${article.slug}: ${e.message}`, 'err');
      err++;
    }
  }

  log('');
  log(`✔ Completado: ${ok} artículos subidos, ${err} errores.`, ok === ARTICLES.length ? 'ok' : 'err');
  if (ok === ARTICLES.length) {
    log('🎉 Colección /content lista. El algoritmo de MenoTrack ya puede leer los artículos.', 'ok');
  }
  btn.disabled = false;
}
